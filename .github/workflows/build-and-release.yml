name: Build And Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements.txt

      - name: Run Python syntax checks
        run: |
          python -m py_compile backend/main.py
          python -m py_compile backend/test_main.py
          python -m py_compile simulator/dashboard.py
          python -m py_compile tools/package_release.py

      - name: Run backend tests
        run: python -m pytest backend/test_main.py -q

  firmware-build:
    name: Firmware Build
    runs-on: ubuntu-latest
    needs: backend-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ESP-IDF v5.3
        uses: espressif/install-esp-idf-action@v1
        with:
          version: v5.3

      - name: Build firmware for ESP32-S3
        working-directory: m5paper_hw
        shell: bash
        run: |
          rm -f sdkconfig
          idf.py set-target esp32s3
          idf.py reconfigure build

      - name: Compute package version
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="sha-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Package release bundle
        run: python tools/package_release.py --build-dir m5paper_hw/build --output-dir release_dist --version "${{ steps.vars.outputs.version }}" --chip esp32s3

      - name: Upload firmware bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: m5paper-dashboard-${{ steps.vars.outputs.version }}
          path: release_dist/m5paper-dashboard-${{ steps.vars.outputs.version }}
          if-no-files-found: error

      - name: Create release archive
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          cd release_dist
          zip -r "m5paper-dashboard-${{ steps.vars.outputs.version }}.zip" "m5paper-dashboard-${{ steps.vars.outputs.version }}"

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ARCHIVE="release_dist/m5paper-dashboard-${{ steps.vars.outputs.version }}.zip"
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${ARCHIVE}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${ARCHIVE}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Automated firmware build for M5Paper 中文看板 (ESP32-S3)"
          fi
